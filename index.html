<!-- CONTENEDOR 100% TRANSPARENTE -->
<div id="particles-container" style="width: 250px; height: 200px; background: transparent; position: relative; overflow: hidden; border-radius: 12px;"></div>

<!-- CARGA DEL SCRIPT DESDE UN CDN LIMPIO -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
  // Esperar a que el script de partículas se cargue en Genially
  function initParticles() {
    if (typeof particlesJS !== 'undefined') {
      particlesJS('particles-container', {
        "particles": {
          "number": { "value": 40, "density": { "enable": false } },
          "color": { "value": "#c59218" }, /* Dorado como tus títulos */
          "shape": { "type": "circle" },
          "opacity": { "value": 0.6, "random": true },
          "size": { "value": 3, "random": true },
          "line_linked": {
            "enable": true,
            "distance": 90,
            "color": "#c59218", /* Líneas doradas delgadas */
            "opacity": 0.4,
            "width": 1
          },
          "move": {
            "enable": true,
            "speed": 1.5,
            "direction": "none",
            "random": true,
            "straight": false,
            "out_mode": "out"
          }
        },
        "interactivity": {
          "detect_on": "canvas",
          "events": {
            "onhover": { "enable": true, "mode": "grab" },
            "onclick": { "enable": false }
          },
          "modes": {
            "grab": { "distance": 100, "line_linked": { "opacity": 0.8 } }
          }
        },
        "retina_detect": true
      });
    } else {
      setTimeout(initParticles, 100);
    }
  }
  initParticles();
</script>
