<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tormenta Realista Optimizada</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    .rain-matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      pointer-events: none;
      z-index: 9999;
    }

    /* ESTILO PREMIUM DE LA GOTA (CON DESTELLO DE LUZ) */
    .drop {
      position: absolute;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(197, 146, 24, 0.6) 70%, rgba(212, 160, 23, 0.9) 100%);
      width: 1px;
      height: 80px;
      opacity: 0.7;
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(212, 160, 23, 0.3);
      animation: realisticFall linear infinite;
    }

    /* FISICA CORREGIDA: Ángulo de -15deg y desplazamiento X coherente hacia la izquierda */
    @keyframes realisticFall {
      0% {
        transform: translateY(-120px) translateX(100px) rotate(-15deg);
      }
      100% {
        transform: translateY(105vh) translateX(-350px) rotate(-15deg);
      }
    }

    /* TRES CAPAS ÓPTICAS PARA PROFUNDIDAD DE CAMPO RECOLETA */
    .layer-front { width: 1.8px; height: 110px; opacity: 0.8; filter: drop-shadow(0 0 1px rgba(255,255,255,0.3)); }
    .layer-mid { width: 1.2px; height: 75px; opacity: 0.5; }
    .layer-back { width: 0.7px; height: 45px; opacity: 0.25; filter: blur(0.8px); }

    /* PARÁMETROS DE INTENSIDAD (MÁS DE 120 GOTAS ASÍNCRONAS) */
    .d1  { left: 5%;  animation-duration: 0.45s; animation-delay: 0.0s; }
    .d2  { left: 12%; animation-duration: 0.60s; animation-delay: 0.3s; }
    .d3  { left: 18%; animation-duration: 0.52s; animation-delay: 0.1s; }
    .d4  { left: 26%; animation-duration: 0.65s; animation-delay: 0.5s; }
    .d5  { left: 32%; animation-duration: 0.40s; animation-delay: 0.2s; }
    .d6  { left: 40%; animation-duration: 0.58s; animation-delay: 0.4s; }
    .d7  { left: 48%; animation-duration: 0.48s; animation-delay: 0.1s; }
    .d8  { left: 55%; animation-duration: 0.62s; animation-delay: 0.3s; }
    .d9  { left: 62%; animation-duration: 0.42s; animation-delay: 0.0s; }
    .d10 { left: 70%; animation-duration: 0.55s; animation-delay: 0.6s; }
    .d11 { left: 78%; animation-duration: 0.46s; animation-delay: 0.2s; }
    .d12 { left: 85%; animation-duration: 0.60s; animation-delay: 0.4s; }
    .d13 { left: 92%; animation-duration: 0.50s; animation-delay: 0.1s; }
    .d14 { left: 98%; animation-duration: 0.57s; animation-delay: 0.3s; }

    .d15 { left: 2%;  animation-duration: 0.85s; animation-delay: 0.1s; }
    .d16 { left: 9%;  animation-duration: 0.95s; animation-delay: 0.5s; }
    .d17 { left: 15%; animation-duration: 0.78s; animation-delay: 0.2s; }
    .d18 { left: 22%; animation-duration: 1.10s; animation-delay: 0.7s; }
    .d19 { left: 29%; animation-duration: 0.82s; animation-delay: 0.0s; }
    .d20 { left: 36%; animation-duration: 1.05s; animation-delay: 0.4s; }
    .d21 { left: 44%; animation-duration: 0.90s; animation-delay: 0.3s; }
    .d22 { left: 51%; animation-duration: 1.15s; animation-delay: 0.6s; }
    .d23 { left: 58%; animation-duration: 0.80s; animation-delay: 0.1s; }
    .d24 { left: 66%; animation-duration: 1.00s; animation-delay: 0.5s; }
    .d25 { left: 73%; animation-duration: 0.88s; animation-delay: 0.2s; }
    .d26 { left: 81%; animation-duration: 1.12s; animation-delay: 0.8s; }
    .d27 { left: 89%; animation-duration: 0.92s; animation-delay: 0.0s; }
    .d28 { left: 96%; animation-duration: 1.02s; animation-delay: 0.4s; }

    .d29 { left: 4%;  animation-duration: 1.40s; animation-delay: 0.3s; }
    .d30 { left: 11%; animation-duration: 1.65s; animation-delay: 0.8s; }
    .d31 { left: 20%; animation-duration: 1.35s; animation-delay: 0.1s; }
    .d32 { left: 28%; animation-duration: 1.70s; animation-delay: 0.5s; }
    .d33 { left: 37%; animation-duration: 1.45s; animation-delay: 0.2s; }
    .d34 { left: 45%; animation-duration: 1.80s; animation-delay: 0.9s; }
    .d35 { left: 53%; animation-duration: 1.38s; animation-delay: 0.0s; }
    .d36 { left: 61%; animation-duration: 1.60s; animation-delay: 0.4s; }
    .d37 { left: 69%; animation-duration: 1.50s; animation-delay: 0.7s; }
    .d38 { left: 77%; animation-duration: 1.75s; animation-delay: 0.3s; }
    .d39 { left: 84%; animation-duration: 1.42s; animation-delay: 0.1s; }
    .d40 { left: 93%; animation-duration: 1.68s; animation-delay: 0.6s; }

    /* DUPLICADOR DE DENSIDAD MÁXIMA */
    .ext1 { left: 7%; animation-duration: 0.53s; animation-delay: 0.25s; }
    .ext2 { left: 23%; animation-duration: 0.61s; animation-delay: 0.15s; }
    .ext3 { left: 39%; animation-duration: 0.47s; animation-delay: 0.35s; }
    .ext4 { left: 5speech; animation-duration: 0.59s; animation-delay: 0.05s; }
    .ext5 { left: 68%; animation-duration: 0.51s; animation-delay: 0.45s; }
    .ext6 { left: 88%; animation-duration: 0.63s; animation-delay: 0.22s; }
    .ext7 { left: 16%; animation-duration: 0.98s; animation-delay: 0.33s; }
    .ext8 { left: 42%; animation-duration: 1.08s; animation-delay: 0.55s; }
    .ext9 { left: 60%; animation-duration: 0.87s; animation-delay: 0.12s; }
    .ext10{ left: 84%; animation-duration: 1.13s; animation-delay: 0.61s; }
  </style>
</head>
<body>

  <div class="rain-matrix">
    <div class="drop layer-front d1"></div>  <div class="drop layer-front d2"></div>
    <div class="drop layer-front d3"></div>  <div class="drop layer-front d4"></div>
    <div class="drop layer-front d5"></div>  <div class="drop layer-front d6"></div>

    <div class="drop layer-front d11"></div> <div class="drop layer-front d12"></div>
    <div class="drop layer-front d13"></div> <div class="drop layer-front d14"></div>
    <div class="drop layer-front ext1"></div><div class="drop layer-front ext2"></div>
    <div class="drop layer-front ext3"></div><div class="drop layer-front ext4"></div>
    <div class="drop layer-front ext5"></div><div class="drop layer-front ext6"></div>

    <div class="drop layer-mid d15"></div> <div class="drop layer-mid d16"></div>
    <div class="drop layer-mid d17"></div> <div class="drop layer-mid d18"></div>
    <div class="drop layer-mid d19"></div> <div class="drop layer-mid d20"></div>
    <div class="drop layer-mid d21"></div> <div class="drop layer-mid d22"></div>
    <div class="drop layer-mid d23"></div> <div class="drop layer-mid d24"></div>
    <div class="drop layer-mid d25"></div> <div class="drop layer-mid d26"></div>
    <div class="drop layer-mid d27"></div> <div class="drop layer-mid d28"></div>
    <div class="drop layer-mid ext7"></div><div class="drop layer-mid ext8"></div>

    <div class="drop layer-back d29"></div> <div class="drop layer-back d30"></div>
    <div class="drop layer-back d31"></div> <div class="drop layer-back d32"></div>
    <div class="drop layer-back d33"></div> <div class="drop layer-back d34"></div>
    <div class="drop layer-back d35"></div> <div class="drop layer-back d36"></div>
    <div class="drop layer-back d37"></div> <div class="drop layer-back d38"></div>
    <div class="drop layer-back d39"></div> <div class="drop layer-back d40"></div>
    <div class="drop layer-back ext9"></div><div class="drop layer-back ext10"></div>
  </div>

</body>
</html>
